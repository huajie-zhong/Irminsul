project_name = "Irminsul"

[paths]
docs_root = "docs"
source_roots = ["src"]

[checks]
soft_deterministic = [
    "mtime-drift",
    "orphans",
    "stale-reaper",
    "supersession",
    "parent-child",
    "glossary",
    "phantom-layer",
    "requires-env",
    "import-deps",
    "schema-doc-drift",
    "cli-doc-drift",
    "check-surface-drift",
    "terminology-overload",
]
# external-links left out by default; enable in nightly workflow with network access.

[languages]
enabled = ["python"]

[render]
target = "mkdocs"
site_dir = "site"
