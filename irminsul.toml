project_name = "Irminsul"

[paths]
docs_root = "docs"
source_roots = ["src"]

[checks]
hard = [
    "frontmatter",
    "globs",
    "uniqueness",
    "links",
    "schema-leak",
    "coverage",
    "liar",
    "prose-file-reference",
    "agents-manifest",
]
soft_deterministic = [
    "mtime-drift",
    "stale-reaper",
    "orphans",
    "supersession",
    "parent-child",
    "glossary-discipline",
    "external-links",
    "reality",
    "boundary",
    "phantom-layer",
    "requires-env",
    "import-deps",
    "terminology-overload",
    "claim-provenance",
    "foundation-readiness",
    "rfc-resolution",
    "decision-updates",
    "inventory-drift",
    "doc-refs",
    "change-binding",
]

[checks.schema_leak]
protected_paths = ["docs/20-components/**/*.md"]

[checks.external_links]
enabled = false
timeout_seconds = 5.0
cache_path = ".irminsul-cache/external-links.json"
ttl_hours = 168

[checks.stale_reaper]
deprecated_threshold_days = 180

[checks.glossary_discipline]
glossary_path = "docs/GLOSSARY.md"

[checks.parent_child]
length_warning_lines = 300

[[checks.terminology_overload.rules]]
term = "coverage"
explicit_phrases = [
    "source ownership coverage",
    "source-file coverage",
    "source file",
    "source files",
    "source paths",
    "coveragecheck",
    "`coverage`",
    "tests:",
    "`tests:`",
]
suggestion = "Clarify whether this means source ownership coverage or the `CoverageCheck` tests: rule"

[overrides]
mtime_drift_days = 30

[languages]
enabled = ["python"]
