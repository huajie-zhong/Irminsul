repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.7
          - types-requests
          - typer>=0.12
          - python-frontmatter>=1.1
          - markdown-it-py>=3.0
          - jinja2>=3.1
          - gitpython>=3.1
          - pathspec>=0.12
          - httpx>=0.27
        files: ^src/

  - repo: local
    hooks:
      - id: irminsul-check
        name: irminsul check
        entry: py -3.12 -m irminsul check --profile=hard
        language: system
        pass_filenames: false
