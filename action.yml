name: irminsul
description: Run irminsul checks against your /docs tree.
branding:
  icon: book-open
  color: green

inputs:
  profile:
    description: 'Check profile to run: hard | configured | advisory | all-available.'
    default: hard
  version:
    description: Pin a specific irminsul release to install (default unpinned).
    default: ''

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install irminsul
      shell: bash
      run: |
        if [ -n "${{ inputs.version }}" ]; then
          pip install "irminsul==${{ inputs.version }}"
        else
          pip install irminsul
        fi
    - name: Run irminsul check
      shell: bash
      run: |
        irminsul check --profile=${{ inputs.profile }}
