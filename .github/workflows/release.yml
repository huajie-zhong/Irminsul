# Release workflow.
#
# Triggers only on `v*.*.*` tag pushes. A single `build` job produces the
# wheel + sdist (with a real version derived from the tag via hatch-vcs),
# uploads them as an artifact, and the publish jobs all consume that single
# artifact. This keeps PyPI, ghcr.io, and the Homebrew tap in lockstep.
#
# One-time setup before the first release:
#   1. PyPI: at https://pypi.org/manage/account/publishing/, add a trusted
#      publisher for this repo and the `release.yml` workflow.
#   2. Homebrew: create a separate repo at <github-user>/homebrew-irminsul.
#      Generate a fine-grained PAT with contents:write on that repo and add
#      it here as the secret HOMEBREW_TAP_TOKEN.
#   3. ghcr.io: nothing — `GITHUB_TOKEN` already has the right scopes.

name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build tools
        run: pip install --upgrade build
      - name: Build wheel and sdist
        run: python -m build
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish via OIDC
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  docker:
    name: Push image to ghcr.io
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: docker/setup-buildx-action@v3
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/irminsul:${{ steps.ver.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/irminsul:latest

  homebrew:
    name: Bump Homebrew tap
    runs-on: ubuntu-latest
    needs: pypi
    steps:
      - name: Resolve version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Dispatch tap update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: ${{ github.repository_owner }}/homebrew-irminsul
          event-type: irminsul-release
          client-payload: |
            {
              "version": "${{ steps.ver.outputs.version }}",
              "tag": "${{ github.ref_name }}"
            }
